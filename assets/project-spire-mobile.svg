<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1040" viewBox="0 0 720 1040" role="img" aria-labelledby="title desc">
  <title id="title">SpireVibePlaying system evidence</title>
  <desc id="desc">Mobile diagram of a hybrid deterministic and LLM-assisted decision pipeline.</desc>
  <rect width="720" height="1040" fill="#ffffff"/>

    <text x="72" y="439" fill="#d51f4b" font-size="23" font-weight="700">CALCULATE</text><text x="250" y="477" fill="#111111" font-size="34" font-weight="700">Draw probability</text>
    <path d="M360 519V554" stroke="#111111" stroke-width="4"/>
    <rect x="42" y="554" width="636" height="154" fill="#d51f4b"/>
    <text x="72" y="600" fill="#ffffff" font-size="23" font-weight="700">SOLVE</text><text x="250" y="646" fill="#ffffff" font-size="39" font-weight="700">DFS combat</text><text x="250" y="680" fill="#ffffff" font-size="24">multi-turn prediction</text>
    <path d="M360 708V743" stroke="#111111" stroke-width="4"/>
    <rect x="42" y="743" width="636" height="122" fill="#f2f1ed" stroke="#111111" stroke-width="2"/>
    <text x="72" y="785" fill="#d51f4b" font-size="23" font-weight="700">INTERPRET</text><text x="250" y="823" fill="#111111" font-size="34" font-weight="700">LLM explanation</text>
    <path d="M360 865V900" stroke="#111111" stroke-width="4"/>

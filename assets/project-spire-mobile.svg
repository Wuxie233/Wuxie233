  <text x="42" y="132" fill="#111111" font-family="Arial Black, Arial, sans-serif" font-size="49" font-weight="900">SpireVibePlaying</text>
  <text x="42" y="180" fill="#55524e" font-family="Arial, Helvetica, sans-serif" font-size="25">Deterministic analysis first; LLM advice second.</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="42" y="240" width="636" height="122" fill="#111111"/>
    <text x="72" y="282" fill="#d51f4b" font-size="23" font-weight="700">CAPTURE</text><text x="250" y="320" fill="#ffffff" font-size="34" font-weight="700">Game state</text>
    <path d="M360 362V397" stroke="#111111" stroke-width="4"/>

<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480" role="img" aria-labelledby="title desc">
  <title id="title">SpireVibePlaying system evidence</title>
  <desc id="desc">A decision pipeline that combines captured game state, deterministic solving, probability and LLM advice.</desc>
  <rect width="1280" height="480" fill="#ffffff"/>

<svg xmlns="http://www.w3.org/2000/svg" width="720" height="980" viewBox="0 0 720 980" role="img" aria-labelledby="title desc">
  <title id="title">RimWorld AI system evidence</title>
  <desc id="desc">Mobile diagram of four isolated components connected by controlled protocols.</desc>
  <rect width="720" height="980" fill="#111111"/>
  <text x="42" y="58" fill="#d51f4b" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700">02 / PROTOCOL-ISOLATED AGENTS</text>
  <text x="42" y="135" fill="#ffffff" font-family="Arial Black, Arial, sans-serif" font-size="58" font-weight="900">RimWorld AI</text>
  <text x="42" y="182" fill="#c9c7c0" font-family="Arial, Helvetica, sans-serif" font-size="25">Colony operations across an MCP boundary</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="42" y="245" width="636" height="130" fill="#ffffff"/>
    <text x="72" y="290" fill="#d51f4b" font-size="24" font-weight="700">GAME PROCESS</text>
    <text x="72" y="340" fill="#111111" font-size="34" font-weight="700">RimWorld Mod</text>
    <path d="M360 375V415" stroke="#ffffff" stroke-width="4"/>
    <rect x="42" y="415" width="636" height="142" fill="#d51f4b"/>
    <text x="72" y="462" fill="#ffffff" font-size="24" font-weight="700">CONTROLLED BOUNDARY</text>
    <text x="72" y="515" fill="#ffffff" font-size="38" font-weight="700">MCP tools</text>
    <path d="M360 557V597" stroke="#ffffff" stroke-width="4"/>
    <rect x="42" y="597" width="636" height="130" fill="#ffffff"/>
    <text x="72" y="642" fill="#d51f4b" font-size="24" font-weight="700">INDEPENDENT PROCESS</text>
    <text x="72" y="692" fill="#111111" font-size="34" font-weight="700">Agent Runtime</text>
    <path d="M360 727V767" stroke="#ffffff" stroke-width="4"/>
    <rect x="42" y="767" width="636" height="130" fill="#f2f1ed"/>
    <text x="72" y="812" fill="#d51f4b" font-size="24" font-weight="700">OPERATIONS</text>
    <text x="72" y="862" fill="#111111" font-size="34" font-weight="700">WebUI · status · logs · control</text>
    <text x="42" y="944" fill="#c9c7c0" font-size="22">Game access remains typed, explicit and inspectable.</text>

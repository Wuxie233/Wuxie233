<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480" role="img" aria-labelledby="title desc">
  <title id="title">Pulse system evidence</title>
  <desc id="desc">A pre-transaction risk flow from wallet signals through health analysis to a decision checkpoint.</desc>
  <rect width="1280" height="480" fill="#f2f1ed"/>
  <rect x="0" y="0" width="1280" height="82" fill="#d51f4b"/>
  <text x="48" y="52" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">04 / PRE-TRANSACTION RISK</text>
  <text x="48" y="161" fill="#111111" font-family="Arial Black, Arial, sans-serif" font-size="66" font-weight="900">PULSE</text>
  <text x="48" y="205" fill="#55524e" font-family="Arial, Helvetica, sans-serif" font-size="22">Wallet health analysis before a transaction becomes irreversible.</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <path d="M48 306H1232" stroke="#111111" stroke-width="4"/>
    <g fill="#ffffff" stroke="#111111" stroke-width="3"><circle cx="130" cy="306" r="50"/><circle cx="432" cy="306" r="50"/><circle cx="734" cy="306" r="50"/><circle cx="1100" cy="306" r="62"/></g>
    <circle cx="1100" cy="306" r="50" fill="#d51f4b" stroke="none"/>
    <g fill="#111111" font-size="22" font-weight="700" text-anchor="middle"><text x="130" y="314">INPUT</text><text x="432" y="314">READ</text><text x="734" y="314">SCORE</text></g>
    <text x="1100" y="313" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">DECIDE</text>
    <g fill="#55524e" font-size="17" text-anchor="middle">
      <text x="130" y="390">wallet + transaction</text><text x="432" y="390">on-chain signals</text><text x="734" y="390">health + exposure</text><text x="1100" y="405">warn · proceed · stop</text>
    </g>
    <text x="281" y="284" fill="#d51f4b" font-size="30" text-anchor="middle">→</text><text x="583" y="284" fill="#d51f4b" font-size="30" text-anchor="middle">→</text><text x="917" y="284" fill="#d51f4b" font-size="30" text-anchor="middle">→</text>
  </g>
</svg>

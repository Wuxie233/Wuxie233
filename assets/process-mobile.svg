<svg xmlns="http://www.w3.org/2000/svg" width="720" height="940" viewBox="0 0 720 940" role="img" aria-labelledby="title desc">
  <title id="title">Wuxie's delivery process</title>
  <desc id="desc">Mobile four-step delivery loop.</desc>
  <rect width="720" height="940" fill="#111111"/>
  <text x="42" y="58" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700">A CLOSED DELIVERY LOOP</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <path d="M86 118V842" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
    <g fill="#d51f4b"><circle cx="86" cy="176" r="14"/><circle cx="86" cy="368" r="14"/><circle cx="86" cy="560" r="14"/><circle cx="86" cy="752" r="14"/></g>
    <g fill="#d51f4b" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900"><text x="132" y="176">01</text><text x="132" y="368">02</text><text x="132" y="560">03</text><text x="132" y="752">04</text></g>
    <g fill="#ffffff" font-size="34" font-weight="700"><text x="250" y="170">Frame the problem</text><text x="250" y="362">Design boundaries</text><text x="250" y="554">Direct execution</text><text x="250" y="746">Verify the result</text></g>
    <g fill="#b8b6b0" font-size="24"><text x="250" y="211">user · constraint · evidence</text><text x="250" y="403">interfaces · ownership · failure</text><text x="250" y="595">agents · integration · decisions</text><text x="250" y="787">tests · interaction · fallback</text></g>
    <text x="42" y="892" fill="#ffffff" font-size="24">Next iteration starts from recorded evidence.</text>
  </g>
</svg>

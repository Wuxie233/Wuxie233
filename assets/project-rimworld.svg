<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480" role="img" aria-labelledby="title desc">
  <title id="title">RimWorld AI system evidence</title>
  <desc id="desc">A system diagram showing isolation between the RimWorld mod, MCP tools, agent runtime and web interface.</desc>
  <rect width="1280" height="480" fill="#111111"/>
  <text x="48" y="58" fill="#d51f4b" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">02 / PROTOCOL-ISOLATED AGENTS</text>
  <text x="48" y="130" fill="#ffffff" font-family="Arial Black, Arial, sans-serif" font-size="62" font-weight="900">RimWorld AI</text>
  <text x="48" y="174" fill="#c9c7c0" font-family="Arial, Helvetica, sans-serif" font-size="22">Colony operations across a strict MCP boundary</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="48" y="238" width="238" height="142" fill="#ffffff"/>
    <text x="72" y="273" fill="#d51f4b" font-size="17" font-weight="700">GAME PROCESS</text>
    <text x="72" y="317" fill="#111111" font-size="28" font-weight="700">RimWorld Mod</text>
    <text x="72" y="350" fill="#55524e" font-size="17">state · commands · events</text>
    <rect x="382" y="220" width="214" height="178" fill="#d51f4b"/>
    <text x="406" y="260" fill="#ffffff" font-size="17" font-weight="700">BOUNDARY</text>
    <text x="406" y="305" fill="#ffffff" font-size="31" font-weight="700">MCP tools</text>
    <text x="406" y="341" fill="#ffffff" font-size="17">typed operations</text>
    <text x="406" y="369" fill="#ffffff" font-size="17">controlled access</text>
    <rect x="692" y="238" width="238" height="142" fill="#ffffff"/>
    <text x="716" y="273" fill="#d51f4b" font-size="17" font-weight="700">INDEPENDENT PROCESS</text>
    <text x="716" y="317" fill="#111111" font-size="28" font-weight="700">Agent Runtime</text>
    <text x="716" y="350" fill="#55524e" font-size="17">plan · call · observe</text>
    <rect x="1026" y="238" width="206" height="142" fill="#f2f1ed"/>
    <text x="1050" y="273" fill="#d51f4b" font-size="17" font-weight="700">OPERATIONS</text>
    <text x="1050" y="317" fill="#111111" font-size="28" font-weight="700">WebUI</text>
    <text x="1050" y="350" fill="#55524e" font-size="17">status · logs · control</text>
    <g stroke="#ffffff" stroke-width="2" fill="none"><path d="M286 309H370"/><path d="M596 309H680"/><path d="M930 309H1014"/></g>
    <g fill="#d51f4b"><path d="M370 309l-12-7v14z"/><path d="M680 309l-12-7v14z"/><path d="M1014 309l-12-7v14z"/></g>
  </g>
</svg>
